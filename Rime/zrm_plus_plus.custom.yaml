# encoding: utf-8

patch:
  # 保留自然码码表；其中不只有辅码，也有「四码 sima」这类常用编码词。
  engine/translators:
    - punct_translator
    - reverse_lookup_translator
    - script_translator
    - table_translator@zrm2000
    - lua_translator@date_translator
    - table_translator@custom_phrase

  # 自然码码表候选也参与学习，避免只按原始码表顺序出词。
  zrm2000/enable_sentence: true
  zrm2000/enable_user_dict: true
  zrm2000/enable_encoder: true
  zrm2000/encode_commit_history: true

  # 停止补全到全拼
  translator/preedit_format: []
  
  # 自定义词库
  translator/dictionary: extended
  translator/enable_user_dict: true
  translator/enable_sentence: true
  translator/enable_encoder: true
  translator/encode_commit_history: true
  translator/max_homophones: 4
  translator/max_homographs: 4
  translator/max_sentences: 3
  translator/initial_quality: 1.2

  # 自定义短语只做固定短语和快捷输入，不参与补全造句，并提高候选优先级。
  custom_phrase/enable_completion: false
  custom_phrase/enable_sentence: false
  custom_phrase/initial_quality: 99

  # 自定义快捷键
  key_binder/bindings:
    - { when: paging, accept: bracketleft, send: Page_Up }
    - { when: has_menu, accept: bracketright, send: Page_Down }
  
  # 日期脚本, 会使中文标点失效, 待解决
  # "engine/translators/@script_translator": lua_translator@date_translator
